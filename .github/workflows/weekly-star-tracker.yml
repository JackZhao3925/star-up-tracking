name: Weekly Star Growth Tracker

on:
  schedule:
    # 每周日 08:00 UTC 运行（北京时间周日 16:00）
    - cron: '0 8 * * 0'
  workflow_dispatch: {}

concurrency:
  group: weekly-star-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "pip-cache-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}"
          restore-keys: |
            pip-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Run star tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/track_stars.py || (echo "Tracker failed" && exit 1)

      - name: Commit docs (Pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update weekly star report (docs)"
            git push
          fi
